name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Ruff (critical errors only — syntax / undefined names)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Byte-compile all modules
        run: python -m compileall -q .

      - name: Import smoke test (no network)
        run: |
          python -c "import bs, replay_engine; print('imports OK')"
